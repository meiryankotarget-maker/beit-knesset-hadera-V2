<!DOCTYPE html>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">

  <!-- לוגו — צד ימין -->
  <a href="#" class="navbar__logo">

      <path d="M6 15c0 0 .5-2 2-2h4c1 0 2 .5 2 1.5S13 16 12 16H9.5"/>
      <path d="M6 15l-1.5 3.5h13L16 15"/>

      <text x="15" y="9.5" text-anchor="middle" font-size="3.5" fill="#f5ead8" stroke="none" font-family="sans-serif">₪</text>
    </svg>
    תרומות
  </a>

  <button class="navbar__hamburger" aria-label="תפריט" onclick="toggleMenu()">

    <span></span>
    <span></span>
  </button>

  <div class="navbar__mobile-menu" id="mobileMenu">
    <a href="#" class="active">דף הבית</a>
    <a href="#">אודות</a>

    <a href="#">שיעורי תורה</a>

    <a href="#">צור קשר</a>
    <a href="#" class="navbar__donate" style="margin: 12px 24px; justify-content: center;">תרומות</a>

</nav>

<section class="hero">

  <div class="hero__bg"></div>

  <!--
    עתיד — סרטון:
    <video class="hero__video" autoplay muted loop playsinline>
      <source src="assets/videos/hero-bg.mp4" type="video/mp4">
    </video>
  -->

  <!-- כיסוי כהה -->
  <div class="hero__overlay"></div>

  <!-- תוכן -->
  <div class="hero__content">
    <h1 class="hero__title">בית הכנסת הגדול חדרה</h1>
    <p class="hero__subtitle">מגדל אור של תורה ותפילה בלב העיר</p>
    <a href="#" class="hero__cta">לוח זמני התפילות לשבוע הקרוב</a>

</section>
