    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    direction: rtl;
    position: relative;
    overflow: hidden;
  }

  /* ── background watermark ── */
  body::before {
    display: none;
  }

  /* ── curved timeline on the left ── */
  .timeline {
    position: fixed;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 1;
  }

  .timeline-line {
    width: 3px;
    height: 220px;
    background: linear-gradient(to bottom, var(--gold-light), var(--gold));
    border-radius: 2px;
    position: relative;
  }

  .timeline-text {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-top: 8px;
    white-space: nowrap;
  }

  /* ── card ── */
  .card {
    background: transparent;
    border-radius: 20px;
    box-shadow: none;
    padding: 40px 48px 44px;
    max-width: 680px;
    width: 100%;
    position: relative;
    z-index: 2;
    animation: fadeUp .55s ease both;
    border: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── header ── */
  .main-title {
    display: none;
  }

  .subtitle {
    text-align: center;
    font-size: 1rem;
    color: var(--text-mid);
    margin-bottom: 28px;
  }

  .subtitle strong {
    color: var(--teal);
    font-weight: 700;
  }

  /* ── inner grid ── */
  .inner-grid {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 28px;
    align-items: stretch;
  }

  /* ── form ── */
  .form-side { display: flex; flex-direction: column; gap: 16px; }

  .field-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 5px;
    display: block;
  }

  .field-label::after {
    content: ':';
    margin-right: 0;
    margin-left: 0;
  }

  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 11px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.92rem;
    color: var(--text-dark);
    background: rgba(255,255,255,0.9);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    direction: rtl;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,150,90,0.15);
    background: var(--white);
  }

  textarea {
    resize: vertical;
    min-height: 96px;
    line-height: 1.6;
  }

  .btn-submit {
    display: block;
    width: fit-content;
    margin: 4px auto 0;
    background: var(--teal);
    color: var(--white);
    font-family: 'Heebo', sans-serif;

    font-weight: 700;

  }

  .info-side { display: flex; flex-direction: column; gap: 16px; height: 100%; }

    border-radius: 10px;
    overflow: hidden;
    position: relative;
    flex: 1;
  }

  .map-label {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.85rem;
    font-weight: 700;

    padding: 2px 8px;
    border-radius: 4px;
    z-index: 1;

    height: 100%;
    min-height: 200px;

    display: block;
    filter: sepia(40%) hue-rotate(140deg) saturate(60%) brightness(0.95);
  }

  .contact-info {
    background: rgba(255,255,255,0.85);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid var(--border);
  }

  .contact-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-mid);
    font-weight: 500;
    direction: ltr;
  }

  .contact-row .icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  /* ── footer tagline ── */
  .tagline {
    text-align: center;
    margin-top: 28px;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  /* ── menorah SVG ── */
  .menorah-wrap {
    text-align: center;
    margin-top: 16px;
    opacity: .25;
  }

  /* ── responsive ── */
  @media (max-width: 600px) {
    .inner-grid { grid-template-columns: 1fr; }
    .card { padding: 28px 20px 32px; }
    .main-title { font-size: 2.2rem; }
    .timeline { display: none; }
  }
</style>
